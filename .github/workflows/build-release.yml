name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r requirements.txt pyinstaller
      - name: PyInstaller (portable exe, public)
        env:
          GITTOOL_SAUSAGE_INTERNAL: ""
        run: >
          pyinstaller --noconfirm
          --distpath dist
          --workpath packaging/pyinstaller/work-win-ci
          packaging/pyinstaller/GitPullSwitchTool_windows.spec
      - name: Inno Setup
        run: choco install innosetup -y
      - name: Installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "${{ github.workspace }}\packaging\windows\GitPullSwitchTool.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/GitPullSwitchTool.exe
            dist/windows-installer/*.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build universal2 (.app + DMG)
        run: chmod +x scripts/build_macos.sh && ./scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            dist/macos-portable/GitPullSwitchTool.app
            dist/macos-installer/*.dmg
