app:
  name: Git 拉线切线工具
  version: 1.0.0
  language: zh
  theme: light
  default_language: zh
  default_theme: light
paths:
  recent_projects:
  - D:\workspace\unityprj\unity-client-2022
  - D:\workspace\unityprj\unity-client-2022-g
  - D:\workspace\unityprj\unity-0428
  - D:\workspace\unityprj\unity-client-2021-player
  default_branch: develop
  default_projects_dir: D:/Projects
  last_added_dir: D:/workspace/unityprj/unity-client-2021-player
  last_selected_project: D:\workspace\unityprj\unity-client-2022
  repo_orders:
    D:\workspace\unityprj\unity-client-2022:
    - D:\workspace\unityprj\unity-client-2022
    - D:\workspace\unityprj\unity-client-2022\Assets\Script
    - D:\workspace\unityprj\unity-client-2022\Assets\Art
    - D:\workspace\unityprj\unity-client-2022\Assets\Scenes
    - D:\workspace\unityprj\unity-client-2022\Assets\Audio
    - D:\workspace\unityprj\unity-client-2022\Assets\ToBundle
git:
  max_concurrent: 4
  fetch_args:
  - --no-tags
  - -f
  switch_force: true
  auto_unlock: true
ui:
  log_max_lines: 500
  show_progress: true
  enable_drag_drop: true
favorites:
  branches:
  - develop
  - main
  - master
  - feature/v6.3/build-so-symbol
  - release
github:
  repo: your-username/git-gui-pull-switch-tool
  issues_url: https://api.github.com/repos/your-username/git-gui-pull-switch-tool/issues
