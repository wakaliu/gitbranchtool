app:
  name: Git 拉线切线工具
  version: 1.0.4
  language: zh
  theme: light
  default_language: zh
  default_theme: light
paths:
  recent_projects:
  - D:\workspace\unityprj\unity-client-2022
  default_branch: develop
  default_projects_dir: D:/Projects
  last_added_dir: D:\workspace\unityprj\unity-client-2022
  last_selected_project: D:\workspace\unityprj\unity-client-2022
  repo_orders:
    D:\workspace\unityprj\unity-client-2022:
    - D:\workspace\unityprj\unity-client-2022
    - D:\workspace\unityprj\unity-client-2022\Assets\Script
    - D:\workspace\unityprj\unity-client-2022\Assets\Art
    - D:\workspace\unityprj\unity-client-2022\Assets\Scenes
    - D:\workspace\unityprj\unity-client-2022\Assets\Audio
    - D:\workspace\unityprj\unity-client-2022\Assets\ToBundle
git:
  max_concurrent: 4
  fetch_args:
  - --no-tags
  - -f
  switch_force: true
  auto_unlock: true
  switch_max_stash_files: 500
  slim_shallow: false
ui:
  log_max_lines: 500
  show_progress: true
  enable_drag_drop: true
favorites:
  branches:
  - develop
  - main
  - master
  - feature/v6.3/build-so-symbol
  - release
github:
  repo: wakaliu/gitbranchtool
  issues_url: https://api.github.com/repos/wakaliu/gitbranchtool/issues
  token: ''
  issue_labels: []
  feedback_issues_web_url: https://github.com/wakaliu/gitbranchtool/issues/new
update:
  check_on_startup: true
  startup_check_cooldown_minutes: 30
  rate_limit_fallback_minutes: 60
  last_auto_check_at: 0
  last_check_at: 0
  rate_limit_backoff_until: 0
  auto_dismissed_version: ''
