app:
  name: Git 拉线切线工具
  version: 1.0.4
  language: zh
  theme: light
paths:
  recent_projects: []
  default_branch: develop
git:
  max_concurrent: 6
  fetch_args:
    - --no-tags
    - -f
  switch_force: true
  auto_unlock: true
  switch_max_stash_files: 500
  switch_checkout_timeout: 300
  switch_fetch_timeout: 120
  slim_shallow: false
ui:
  log_max_lines: 500
  show_progress: true
favorites:
  branches:
    - develop
    - main
    - master
github:
  repo: wakaliu/gitbranchtool
  issues_url: https://api.github.com/repos/wakaliu/gitbranchtool/issues
  token: ''
  issue_labels: []
  feedback_issues_web_url: https://github.com/wakaliu/gitbranchtool/issues/new
update:
  check_on_startup: true
  startup_check_cooldown_minutes: 30
  rate_limit_fallback_minutes: 60
  last_auto_check_at: 0
  last_check_at: 0
  rate_limit_backoff_until: 0
  auto_dismissed_version: ''
