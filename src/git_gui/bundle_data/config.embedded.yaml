app:
  name: Git 拉线切线工具
  version: 1.0.2
  language: zh
  theme: light
paths:
  recent_projects: []
  default_branch: develop
git:
  max_concurrent: 6
  fetch_args:
    - --no-tags
    - -f
  switch_force: true
  auto_unlock: true
  switch_max_stash_files: 500
ui:
  log_max_lines: 500
  show_progress: true
favorites:
  branches:
    - develop
    - main
    - master
github:
  repo: wakaliu/gitbranchtool
  issues_url: https://api.github.com/repos/wakaliu/gitbranchtool/issues
  token: ''
  issue_labels: []
  feedback_issues_web_url: https://github.com/wakaliu/gitbranchtool/issues/new
